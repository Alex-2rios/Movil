services:
  database:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: terracota
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    volumes:
      - terracota_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d terracota"]
      interval: 5s
      timeout: 5s
      retries: 10

  database-init:
    image: postgres:16-alpine
    environment:
      PGPASSWORD: postgres
    volumes:
      - ./database/terracota_postgresql.sql:/scripts/01-schema.sql:ro
      - ./database/02_PERMISOS_API.sql:/scripts/02-api-user.sql:ro
    command:
      - /bin/sh
      - -c
      - >-
        psql -h database -U postgres -d terracota -v ON_ERROR_STOP=1 -f /scripts/01-schema.sql &&
        psql -h database -U postgres -d terracota -v ON_ERROR_STOP=1 -f /scripts/02-api-user.sql
    depends_on:
      database:
        condition: service_healthy

  api:
    build: ./backend
    environment:
      DATABASE_URL: postgresql://terracota_app:TerracotaLocal123!@database:5432/terracota
      JWT_SECRET: desarrollo-local-cambia-esta-clave-de-terracota-2026
      ACCESS_TOKEN_MINUTES: 60
      CORS_ORIGINS: http://localhost:8081,http://localhost:19006
    ports:
      - "${API_PORT:-8080}:8080"
    depends_on:
      database-init:
        condition: service_completed_successfully

volumes:
  terracota_pgdata:
